openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ServicesHub B2B intermediation platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Mock auth / profile selection
  - name: requester
    description: Requester company portal
  - name: provider
    description: Provider company portal
  - name: admin
    description: Admin / intermediator portal
  - name: catalog
    description: Service catalog
  - name: workorders
    description: Work orders
  - name: financial
    description: Financial operations
  - name: notifications
    description: Notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Mock Auth ───────────────────────────────────────────────────
  /auth/profiles:
    get:
      operationId: listProfiles
      tags: [auth]
      summary: List all mock profiles for dev switcher
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"

  /auth/me:
    get:
      operationId: getCurrentProfile
      tags: [auth]
      summary: Get current mock profile
      parameters:
        - name: x-profile-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  # ─── Requester Portal ─────────────────────────────────────────────
  /requester/dashboard:
    get:
      operationId: getRequesterDashboard
      tags: [requester]
      summary: Requester dashboard summary
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequesterDashboard"

  /requester/work-orders:
    get:
      operationId: listRequesterWorkOrders
      tags: [requester]
      summary: List work orders for requester
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrderRequesterView"
    post:
      operationId: createWorkOrder
      tags: [requester]
      summary: Create a new work order request
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderRequesterView"

  /requester/work-orders/{id}:
    get:
      operationId: getRequesterWorkOrder
      tags: [requester]
      summary: Get single work order detail for requester
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderRequesterView"

  /requester/invoices:
    get:
      operationId: listRequesterInvoices
      tags: [requester]
      summary: List invoices/pending payments for requester
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceRequesterView"

  /requester/invoices/pay:
    post:
      operationId: payInvoices
      tags: [requester]
      summary: Pay selected invoices in batch
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayInvoicesInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResult"

  /requester/catalog:
    get:
      operationId: listCatalogForRequester
      tags: [requester]
      summary: Browse service catalog (requester view, no prices)
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: category
          in: query
          schema:
            type: string
        - name: region
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogItemRequesterView"

  # ─── Provider Portal ─────────────────────────────────────────────
  /provider/dashboard:
    get:
      operationId: getProviderDashboard
      tags: [provider]
      summary: Provider dashboard summary
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDashboard"

  /provider/catalog:
    get:
      operationId: listProviderCatalog
      tags: [provider]
      summary: List provider's own catalog items
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogItem"
    post:
      operationId: createCatalogItem
      tags: [provider]
      summary: Create a new catalog item
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCatalogItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"

  /provider/catalog/{id}:
    put:
      operationId: updateCatalogItem
      tags: [provider]
      summary: Update a catalog item
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCatalogItemInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
    delete:
      operationId: deleteCatalogItem
      tags: [provider]
      summary: Delete a catalog item
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content

  /provider/work-orders:
    get:
      operationId: listProviderWorkOrders
      tags: [provider]
      summary: List work orders assigned to provider
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrderProviderView"

  /provider/work-orders/{id}:
    get:
      operationId: getProviderWorkOrder
      tags: [provider]
      summary: Get single work order for provider
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderProviderView"

  /provider/work-orders/{id}/action:
    post:
      operationId: providerWorkOrderAction
      tags: [provider]
      summary: Take action on a work order (accept, start, complete)
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderActionInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderProviderView"

  /provider/financial:
    get:
      operationId: getProviderFinancial
      tags: [provider]
      summary: Provider financial summary and payout history
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderFinancial"

  # ─── Admin Portal ────────────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Admin operational and financial dashboard
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/requester-companies:
    get:
      operationId: listRequesterCompanies
      tags: [admin]
      summary: List all requester companies
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequesterCompany"
    post:
      operationId: createRequesterCompany
      tags: [admin]
      summary: Create a requester company
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequesterCompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequesterCompany"

  /admin/provider-companies:
    get:
      operationId: listProviderCompanies
      tags: [admin]
      summary: List all provider companies
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderCompany"
    post:
      operationId: createProviderCompany
      tags: [admin]
      summary: Create a provider company
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderCompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCompany"

  /admin/work-orders:
    get:
      operationId: listAdminWorkOrders
      tags: [admin]
      summary: List all work orders (admin full view)
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: status
          in: query
          schema:
            type: string
        - name: requesterId
          in: query
          schema:
            type: string
        - name: providerId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrderAdminView"

  /admin/work-orders/{id}:
    get:
      operationId: getAdminWorkOrder
      tags: [admin]
      summary: Get full work order detail for admin
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderAdminView"

  /admin/work-orders/{id}/adjust:
    post:
      operationId: adminAdjustWorkOrder
      tags: [admin]
      summary: Admin adjust/reopen/cancel a work order
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAdjustWorkOrderInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderAdminView"

  /admin/work-orders/{id}/assign:
    post:
      operationId: adminAssignWorkOrder
      tags: [admin]
      summary: Admin assign a work order to a provider
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAssignWorkOrderInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderAdminView"

  /admin/invoices:
    get:
      operationId: listAdminInvoices
      tags: [admin]
      summary: List all invoices (admin)
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceAdminView"

  /admin/payments:
    get:
      operationId: listAdminPayments
      tags: [admin]
      summary: List all payments received from requesters
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /admin/payouts:
    get:
      operationId: listAdminPayouts
      tags: [admin]
      summary: List all payouts to providers
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payout"
    post:
      operationId: registerPayout
      tags: [admin]
      summary: Register a payout to a provider
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPayoutInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payout"

  /admin/travel-pricing:
    get:
      operationId: listTravelPricingRules
      tags: [admin]
      summary: List travel pricing rules
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TravelPricingRule"
    post:
      operationId: createTravelPricingRule
      tags: [admin]
      summary: Create a travel pricing rule
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTravelPricingRuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelPricingRule"

  /admin/travel-pricing/{id}:
    put:
      operationId: updateTravelPricingRule
      tags: [admin]
      summary: Update a travel pricing rule
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTravelPricingRuleInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelPricingRule"
    delete:
      operationId: deleteTravelPricingRule
      tags: [admin]
      summary: Delete a travel pricing rule
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content

  /admin/commission-settings:
    get:
      operationId: getCommissionSettings
      tags: [admin]
      summary: Get commission configuration
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionSettings"
    put:
      operationId: updateCommissionSettings
      tags: [admin]
      summary: Update commission settings
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionSettings"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionSettings"

  /admin/audit-log:
    get:
      operationId: listAuditLog
      tags: [admin]
      summary: List audit/history log for admin
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: workOrderId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  # ─── Notifications ────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current profile
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      parameters:
        - $ref: "#/components/parameters/ProfileHeader"
      responses:
        "204":
          description: No content

components:
  parameters:
    ProfileHeader:
      name: x-profile-id
      in: header
      required: false
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Profile:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [requester, provider, admin]
        name:
          type: string
        companyId:
          type: string
        companyName:
          type: string
      required: [id, role, name, companyId, companyName]

    # ─── Companies ───────────────────────────────────────────────
    RequesterCompany:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        taxId:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        cep:
          type: string
        city:
          type: string
        state:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, createdAt]

    CreateRequesterCompanyInput:
      type: object
      properties:
        name:
          type: string
        taxId:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        cep:
          type: string
        city:
          type: string
        state:
          type: string
      required: [name, email]

    ProviderCompany:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        taxId:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        cep:
          type: string
        city:
          type: string
        state:
          type: string
        commissionRate:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, createdAt]

    CreateProviderCompanyInput:
      type: object
      properties:
        name:
          type: string
        taxId:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        cep:
          type: string
        city:
          type: string
        state:
          type: string
        commissionRate:
          type: number
      required: [name, email]

    # ─── Catalog ─────────────────────────────────────────────────
    CatalogItem:
      type: object
      properties:
        id:
          type: string
        providerCompanyId:
          type: string
        providerCompanyName:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        estimatedDays:
          type: integer
        basePrice:
          type: number
        isAvailable:
          type: boolean
        regions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required: [id, providerCompanyId, name, category, basePrice, isAvailable, createdAt]

    CatalogItemRequesterView:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        estimatedDays:
          type: integer
        isAvailable:
          type: boolean
        regions:
          type: array
          items:
            type: string
      required: [id, name, category, isAvailable]

    CreateCatalogItemInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        estimatedDays:
          type: integer
        basePrice:
          type: number
        isAvailable:
          type: boolean
        regions:
          type: array
          items:
            type: string
      required: [name, category, basePrice]

    # ─── Work Orders ──────────────────────────────────────────────
    WorkOrderStatus:
      type: string
      enum:
        - requested
        - accepted
        - in_progress
        - completed
        - invoiced
        - paid
        - paid_out
        - closed
        - cancelled

    WorkOrderRequesterView:
      type: object
      properties:
        id:
          type: string
        serviceName:
          type: string
        category:
          type: string
        location:
          type: string
        description:
          type: string
        notes:
          type: string
        status:
          $ref: "#/components/schemas/WorkOrderStatus"
        requestedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        finalPrice:
          type: number
        invoiceId:
          type: string
        statusHistory:
          type: array
          items:
            $ref: "#/components/schemas/StatusHistoryEntry"
      required: [id, serviceName, status, requestedAt]

    WorkOrderProviderView:
      type: object
      properties:
        id:
          type: string
        serviceName:
          type: string
        category:
          type: string
        location:
          type: string
        description:
          type: string
        notes:
          type: string
        status:
          $ref: "#/components/schemas/WorkOrderStatus"
        requestedAt:
          type: string
          format: date-time
